<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Kareem TV - Live Stream</title>
    
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HLS.js for playing .m3u8 streams on non-Apple devices -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Tailwind slate-900 */
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
        }
        
        /* Custom styling for the video player to make it look embedded and sleek */
        video {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background-color: #000;
        }

        /* Pulsing animation for the LIVE badge */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .pulse-dot {
            animation: pulse-ring 2s infinite;
        }

        /* Apple Liquid Glass Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -5px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            backdrop-filter: blur(4px);
        }
        input[type=range]:focus {
            outline: none;
        }

        /* Dynamic Slider Progress (Apple Liquid Glass) */
        #timeline-slider {
            background: linear-gradient(to right, #ffffff 0%, #ffffff var(--progress, 100%), rgba(255, 255, 255, 0.2) var(--progress, 100%), rgba(255, 255, 255, 0.2) 100%);
        }
        #volume-slider {
            background: linear-gradient(to right, #ffffff 0%, #ffffff var(--vol-progress, 0%), rgba(255, 255, 255, 0.3) var(--vol-progress, 0%), rgba(255, 255, 255, 0.3) 100%);
        }
        #timeline-slider::-webkit-slider-runnable-track,
        #volume-slider::-webkit-slider-runnable-track {
            background: transparent; /* Overridden by the input background for dynamic fill */
        }
    </style>
</head>
<body class="min-h-screen text-slate-200 flex flex-col items-center justify-center p-4 md:p-8">

    <div class="max-w-5xl w-full">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-white tracking-tight">Quran Kareem TV</h1>
                <p class="text-sm text-slate-400 mt-1">Ministry of Information | Kingdom of Bahrain</p>
            </div>
        </div>

        <!-- Video Container -->
        <div id="video-container" class="relative w-full rounded-2xl overflow-hidden bg-slate-800 border border-slate-700/50 aspect-video flex items-center justify-center shadow-2xl">
            
            <!-- Loading Indicator (Shows before stream loads) -->
            <div id="loading" class="absolute inset-0 flex flex-col items-center justify-center z-0">
                <svg class="animate-spin h-8 w-8 text-indigo-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="text-slate-400 text-sm">Connecting to stream...</span>
            </div>

            <!-- Video Element -->
            <!-- Note: controls removed, handled by custom UI -->
            <video 
                id="video-player" 
                class="relative z-10 w-full h-full object-cover cursor-pointer" 
                autoplay 
                muted 
                playsinline>
            </video>

            <!-- Apple Liquid Glass Custom Controls -->
            <div id="custom-controls" class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[95%] sm:w-[90%] max-w-3xl z-20 flex items-center gap-3 sm:gap-4 px-4 py-3 bg-black/60 backdrop-blur-2xl border border-white/10 shadow-[0_8px_32px_0_rgba(0,0,0,0.6)] rounded-2xl opacity-0 transition-opacity duration-500">
                
                <!-- Play/Pause -->
                <button id="play-pause-btn" class="shrink-0 text-white hover:text-white/70 transition-colors focus:outline-none drop-shadow-md">
                   <svg id="play-icon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                   <svg id="pause-icon" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                
                <!-- Timeline -->
                <div class="flex-1 flex items-center px-2">
                    <input type="range" id="timeline-slider" min="0" max="100" step="0.1" value="100" class="w-full h-1.5 cursor-pointer rounded-full appearance-none outline-none transition-all duration-150">
                </div>

                <!-- Right Side Controls (Volume + Fullscreen) -->
                <div class="shrink-0 flex items-center gap-2 sm:gap-4">
                    <!-- Volume Hover Group -->
                    <div class="flex items-center gap-2 group/volume">
                        <button id="mute-btn" class="text-white hover:text-white/70 transition-colors focus:outline-none drop-shadow-md">
                            <!-- High Volume -->
                            <svg id="vol-icon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>
                            <!-- Muted -->
                            <svg id="muted-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z m10.414-9l3 3m0 0l3 3m-3-3l-3 3m3-3l3-3" /></svg>
                        </button>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0" class="w-0 opacity-0 transition-all duration-300 origin-left group-hover/volume:w-16 group-hover/volume:opacity-100 sm:group-hover/volume:w-20">
                    </div>

                    <!-- Fullscreen -->
                    <button id="fullscreen-btn" class="text-white hover:text-white/70 transition-colors focus:outline-none drop-shadow-md">
                        <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer / Instructions -->
        <div class="mt-6 flex flex-col md:flex-row items-center justify-between bg-slate-800/50 p-4 rounded-xl border border-slate-700/50 text-sm text-slate-400">
            <p><strong>Note:</strong> The video starts muted automatically to support browser autoplay rules. Please click the volume icon to unmute.</p>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('video-player');
            const loading = document.getElementById('loading');
            
            // Player UI Elements
            const videoContainer = document.getElementById('video-container');
            const customControls = document.getElementById('custom-controls');
            const playPauseBtn = document.getElementById('play-pause-btn');
            const playIcon = document.getElementById('play-icon');
            const pauseIcon = document.getElementById('pause-icon');
            const muteBtn = document.getElementById('mute-btn');
            const volIcon = document.getElementById('vol-icon');
            const mutedIcon = document.getElementById('muted-icon');
            const volumeSlider = document.getElementById('volume-slider');
            const fullscreenBtn = document.getElementById('fullscreen-btn');
            const timelineSlider = document.getElementById('timeline-slider');

            // Controls visibility logic
            let controlsTimeout;
            const showControls = () => {
                customControls.classList.remove('opacity-0');
                customControls.classList.add('opacity-100');
                videoContainer.style.cursor = 'default';
                clearTimeout(controlsTimeout);
                
                controlsTimeout = setTimeout(() => {
                    // Hide controls only if mouse isn't hovering directly over them
                    if (!customControls.matches(':hover')) {
                        customControls.classList.remove('opacity-100');
                        customControls.classList.add('opacity-0');
                        // Hide cursor for cinematic effect if video is playing
                        if (!video.paused) {
                            videoContainer.style.cursor = 'none';
                        }
                    }
                }, 2500);
            };

            videoContainer.addEventListener('mousemove', showControls);
            videoContainer.addEventListener('mouseleave', () => {
                if (!video.paused) {
                    customControls.classList.remove('opacity-100');
                    customControls.classList.add('opacity-0');
                }
            });

            // Play / Pause Logic
            const togglePlay = () => {
                if (video.paused) {
                    video.play();
                } else {
                    video.pause();
                }
            };

            playPauseBtn.addEventListener('click', togglePlay);
            video.addEventListener('click', togglePlay);

            video.addEventListener('play', () => {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                showControls();
            });

            video.addEventListener('pause', () => {
                pauseIcon.classList.add('hidden');
                playIcon.classList.remove('hidden');
                showControls(); // Keep controls visible when paused
                clearTimeout(controlsTimeout);
            });

            // Volume Logic
            const updateVolumeUI = () => {
                if (video.muted || video.volume === 0) {
                    volIcon.classList.add('hidden');
                    mutedIcon.classList.remove('hidden');
                    volumeSlider.value = 0;
                    volumeSlider.style.setProperty('--vol-progress', `0%`);
                } else {
                    mutedIcon.classList.add('hidden');
                    volIcon.classList.remove('hidden');
                    volumeSlider.value = video.volume;
                    volumeSlider.style.setProperty('--vol-progress', `${video.volume * 100}%`);
                }
            };

            muteBtn.addEventListener('click', () => {
                video.muted = !video.muted;
                if (!video.muted && video.volume === 0) {
                    video.volume = 0.5; // restore to 50% if unmuted from 0
                }
                updateVolumeUI();
            });

            volumeSlider.addEventListener('input', (e) => {
                const vol = parseFloat(e.target.value);
                video.volume = vol;
                video.muted = vol === 0;
                updateVolumeUI();
            });

            video.addEventListener('volumechange', updateVolumeUI);

            // Timeline Logic
            video.addEventListener('timeupdate', () => {
                // If duration is missing or infinite (pure live stream without DVR), lock timeline to 100%
                if (!video.duration || !isFinite(video.duration)) {
                    timelineSlider.style.setProperty('--progress', `100%`);
                    timelineSlider.value = 100;
                    return;
                }
                const progress = (video.currentTime / video.duration) * 100;
                timelineSlider.value = progress;
                timelineSlider.style.setProperty('--progress', `${progress}%`);
            });

            timelineSlider.addEventListener('input', (e) => {
                // Prevent seeking if pure live stream without DVR window
                if (!video.duration || !isFinite(video.duration)) {
                    timelineSlider.value = 100;
                    return;
                }
                const seekTo = (e.target.value / 100) * video.duration;
                video.currentTime = seekTo;
                timelineSlider.style.setProperty('--progress', `${e.target.value}%`);
            });

            // Fullscreen Logic w/ CSS Fallback
            let isFallbackFullscreen = false;
            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement && !isFallbackFullscreen) {
                    const enterFallback = () => {
                        isFallbackFullscreen = true;
                        videoContainer.classList.remove('relative', 'rounded-2xl', 'aspect-video');
                        videoContainer.classList.add('fixed', 'inset-0', 'z-50', 'rounded-none', 'w-full', 'h-full');
                        document.body.style.overflow = 'hidden'; // Prevent background scrolling
                    };

                    if (videoContainer.requestFullscreen) {
                        videoContainer.requestFullscreen().catch(err => {
                            console.warn("Native fullscreen blocked by permissions. Using full-window fallback.");
                            enterFallback();
                        });
                    } else {
                        enterFallback();
                    }
                } else {
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    }
                    if (isFallbackFullscreen) {
                        isFallbackFullscreen = false;
                        videoContainer.classList.remove('fixed', 'inset-0', 'z-50', 'rounded-none', 'w-full', 'h-full');
                        videoContainer.classList.add('relative', 'rounded-2xl', 'aspect-video');
                        document.body.style.overflow = '';
                    }
                }
            });
            
            // Extracted Stream URL
            const streamUrl = 'https://5c7b683162943.streamlock.net/live/ngrp:bahrainquran_all/playlist.m3u8';

            // Function to hide the loading spinner
            const hideLoading = () => {
                if(loading) loading.style.display = 'none';
            };

            // Check if HLS.js is supported (Most modern browsers excluding Safari)
            if (Hls.isSupported()) {
                const hls = new Hls({
                    // Tuning parameters for live streams
                    liveSyncDurationCount: 3,
                    liveMaxLatencyDurationCount: 10,
                });
                
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(e => console.log("Autoplay prevented:", e));
                });
                
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.error("Fatal network error encountered, trying to recover");
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.error("Fatal media error encountered, trying to recover");
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                break;
                        }
                    }
                });

                // Hide loader when the video starts playing
                video.addEventListener('playing', hideLoading);
            }
            // Safari has native support for HLS
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', function() {
                    video.play().catch(e => console.log("Autoplay prevented:", e));
                });
                video.addEventListener('playing', hideLoading);
            } else {
                loading.innerHTML = '<span class="text-red-400">Your browser does not support HLS video streaming.</span>';
            }
        });
    </script>
</body>
</html>
